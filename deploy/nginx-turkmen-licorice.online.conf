# Nginx: turkmen-licorice.online
# Сначала только HTTP (80). HTTPS добавляет certbot.
# Ссылка: sudo ln -sf .../deploy/nginx-turkmen-licorice.online.conf /etc/nginx/sites-enabled/turkmen-licorice.online.conf
#
# --- Certbot (один раз) ---
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d turkmen-licorice.online -d www.turkmen-licorice.online
# Certbot сам создаст блок 443 и редирект HTTP→HTTPS.
# Продление: sudo certbot renew (или cron: 0 3 * * * certbot renew --quiet)

server {
    server_name turkmen-licorice.online www.turkmen-licorice.online;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:3014;
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/turkmen-licorice.online/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/turkmen-licorice.online/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}


server {
    if ($host = www.turkmen-licorice.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = turkmen-licorice.online) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name turkmen-licorice.online www.turkmen-licorice.online;
    return 404; # managed by Certbot




}